<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SEP Meeting Room System</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
            padding: 50px;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            background: #4285F4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #357ae8;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>SEP Meeting Room</h2>
    <p>ระบบจองห้องประชุมออนไลน์</p>
    <button onclick="alert('ขั้นตอนต่อไปเราจะเชื่อม Google Login')">
        Login ด้วย Google
    </button>
</div>

</body>
</html>
