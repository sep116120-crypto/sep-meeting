<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SEP Meeting</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="text-align:center; margin-top:100px; font-family:sans-serif;">

  <h1>SEP Meeting</h1>

  <button onclick="login()">Login with Google</button>
  <button onclick="logout()">Logout</button>

  <script>
    const supabaseUrl = "https://ahzlctcvjzvkplqvxvcf.supabase.co";
    const supabaseKey = "sb_publishable_Ke3LUz0QnOyZvKnSOPElZA_1BN_sxdU";

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    async function login() {
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: "https://sep-meeting.vercel.app"
        }
      });

      if (error) console.error(error);
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      alert("Logged out");
    }
</script>

</body>
</html>
